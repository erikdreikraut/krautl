services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: krautl
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: krautl
    volumes:
      - krautl_db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build: .
    env_file: .env
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./app:/app/app

volumes:
  krautl_db:
