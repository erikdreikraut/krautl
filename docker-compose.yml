services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: krautl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: krautl
    volumes:
      - krautl_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krautl"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "172.17.0.1:8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - app
    ports:
      - "8081:80"

volumes:
  krautl_db:
